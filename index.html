<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tendermint 56-Node Monitor</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --border-color: rgba(255, 255, 255, 0.1);
            
            --step-propose: #3b82f6; /* Blue */
            --step-prevote: #eab308; /* Yellow */
            --step-precommit: #f97316; /* Orange */
            --step-commit: #22c55e; /* Green */
        }
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', 'Segoe UI', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: #f8fafc;
            min-height: 100vh;
            padding: 2rem;
            background-image: 
                radial-gradient(at 0% 0%, rgba(59, 130, 246, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(16, 185, 129, 0.1) 0px, transparent 50%);
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(to right, #60a5fa, #34d399);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 1.25rem;
            max-width: 1400px;
            margin: 0 auto;
        }

        .node-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 1rem;
            backdrop-filter: blur(10px);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .node-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: #475569;
            transition: background 0.3s ease;
        }

        /* Step Colors */
        .node-card[data-step="Propose"]::before { background: var(--step-propose); box-shadow: 0 0 10px var(--step-propose); }
        .node-card[data-step="Prevote"]::before { background: var(--step-prevote); box-shadow: 0 0 10px var(--step-prevote); }
        .node-card[data-step="Precommit"]::before { background: var(--step-precommit); box-shadow: 0 0 10px var(--step-precommit); }
        .node-card.committed {
            animation: pulse-green 0.5s ease-out;
            border-color: var(--step-commit);
        }

        @keyframes pulse-green {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7); }
            50% { transform: scale(1.05); box-shadow: 0 0 20px 5px rgba(34, 197, 94, 0.4); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); }
        }

        .node-id {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            color: #e2e8f0;
        }

        .node-stats {
            display: flex;
            gap: 1rem;
            font-size: 0.875rem;
            color: #94a3b8;
            margin-bottom: 0.5rem;
        }

        .node-step {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-weight: 600;
            padding: 0.25rem 0.5rem;
            border-radius: 9999px;
            background: rgba(255,255,255,0.05);
        }

        .node-card[data-step="Propose"] .node-step { color: var(--step-propose); }
        .node-card[data-step="Prevote"] .node-step { color: var(--step-prevote); }
        .node-card[data-step="Precommit"] .node-step { color: var(--step-precommit); }

    </style>
</head>
<body>

    <header>
        <h1>Tendermint Consensus (56 Nodes)</h1>
    </header>

    <div class="grid" id="node-grid">
        <!-- Cards generated by JS -->
    </div>

    <script>
        const NUM_NODES = 56;
        const grid = document.getElementById('node-grid');
        const cards = {};

        // Initialize 50 cards
        for (let i = 0; i < NUM_NODES; i++) {
            const card = document.createElement('div');
            card.className = 'node-card';
            card.id = `node-${i}`;
            
            card.innerHTML = `
                <div class="node-id">N-${i}</div>
                <div class="node-stats">
                    <span>H: <b id="height-${i}">-</b></span>
                    <span>R: <b id="round-${i}">-</b></span>
                </div>
                <div class="node-step" id="step-${i}">OFFLINE</div>
            `;
            grid.appendChild(card);
            cards[i] = {
                cardEl: card,
                heightEl: document.getElementById(`height-${i}`),
                roundEl: document.getElementById(`round-${i}`),
                stepEl: document.getElementById(`step-${i}`),
                lastHeight: 0
            };
        }

        function connect() {
            const ws = new WebSocket('ws://localhost:8081');
            
            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                
                if (data.type === 'init') {
                    for (const [id, state] of Object.entries(data.state)) {
                        updateNode(state);
                    }
                } else {
                    updateNode(data);
                }
            };

            ws.onclose = () => {
                setTimeout(connect, 1000); // Reconnect
            };
        }

        function updateNode(state) {
            const node = cards[state.id];
            if (!node) return;

            node.heightEl.textContent = state.height;
            node.roundEl.textContent = state.round;
            node.stepEl.textContent = state.step;
            node.cardEl.setAttribute('data-step', state.step);

            // Trigger commit animation if height increases
            if (state.height > node.lastHeight && node.lastHeight !== 0) {
                node.cardEl.classList.remove('committed');
                void node.cardEl.offsetWidth; // trigger reflow
                node.cardEl.classList.add('committed');
            }
            node.lastHeight = state.height;
        }

        connect();
    </script>
</body>
</html>
